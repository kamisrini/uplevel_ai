services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uplevel_ai
      POSTGRES_PASSWORD: uplevel_ai
      POSTGRES_DB: uplevel_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uplevel_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/uplevel_ai1!
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
